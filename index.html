<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0A0E17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="日积跬步">
  <meta name="description" content="不积跬步，无以至千里 - 日积跬步习惯养成助手">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <title>日积跬步</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <!-- 应用容器 -->
  <div id="app">
    <!-- ===== 顶部导航 ===== -->
    <header class="header">
      <div class="header__left">
        <div class="header__logo">🌱</div>
        <div>
          <div class="header__title">日积跬步</div>
          <div class="header__subtitle">不积跬步，无以至千里</div>
        </div>
      </div>
      <div class="header__right">
        <button class="header__btn" id="btn-reports" title="报表">📊</button>
        <button class="header__btn" id="btn-settings" title="设置">⚙️</button>
      </div>
    </header>

    <!-- ===== 页面容器 ===== -->
    <!-- 首页 -->
    <div class="page page--active" id="page-home"></div>
    <!-- 习惯管理页 -->
    <div class="page" id="page-manage"></div>
    <!-- 日历视图页 -->
    <div class="page" id="page-calendar"></div>
    <!-- 报表页 -->
    <div class="page" id="page-reports"></div>
    <!-- 设置页 -->
    <div class="page" id="page-settings"></div>

    <!-- ===== 底部导航 ===== -->
    <nav class="bottom-nav">
      <button class="nav-item nav-item--active" data-page="home">
        <span class="nav-item__icon">🏠</span>
        <span>今日</span>
      </button>
      <button class="nav-item" data-page="manage">
        <span class="nav-item__icon">📋</span>
        <span>管理</span>
      </button>
      <button class="nav-item" data-page="calendar">
        <span class="nav-item__icon">📅</span>
        <span>日历</span>
      </button>
      <button class="nav-item" data-page="settings">
        <span class="nav-item__icon">⚙️</span>
        <span>设置</span>
      </button>
    </nav>
  </div>

  <!-- ===== JavaScript 模块（按依赖顺序加载） ===== -->
  <script src="js/db.js"></script>
  <script src="js/defaults.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/render.js"></script>
  <script src="js/reminder-service.js"></script>
  <script src="js/app.js"></script>

  <!-- ===== Service Worker 注册 ===== -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(function(reg) {
          console.log('[PWA] Service Worker 注册成功:', reg.scope);
        }).catch(function(err) {
          console.warn('[PWA] Service Worker 注册失败:', err);
        });
      });
    }
  </script>
</body>
</html>
